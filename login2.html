<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> buzzWork </title>
    <link rel="stylesheet" href="login2.css">
</head>
<body>

<section class="login-section">
    <a href="#" class="logo-container">
        <span class="logo-text">buzzWork</span>    
    </a>
    <div class="login-card">
        <div class="card-body">
            <h1 class="form-title"> Login </h1>
            
            <form action="#">
                <div class="form-group">
                    <label for="email" class="label-text">Enter your email</label>
                    <input type="email" name="email" id="email" class="input-field" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="label-text">Passwort</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" class="input-field" required>
                </div>
                
                <button type="submit" class="btn-primary">Submit</button>
            </form>
        </div>
    </div>
</section>

</body>
</html>
