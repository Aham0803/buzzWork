<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="left-section">
      <button class="create-btn">Create</button>
    </div>
    <div class="search-box">
      <input type="search" placeholder="Search" />
    </div>
   
  </header>

  <div class="main-container">
    <div class="left-dashboard">
      <aside>
        <nav class="sidebar-nav">
          <a href="home.html" class="nav-item">Home</a>
          <a href="dashboard.html" class="nav-item">Dashboard</a>
          <a href="inbox.html" class="nav-item">Kanban Board</a>
          <a href="MyTask.html" class="nav-item">My Tasks</a>

          <div class="nav-section-label">WORKSPACE</div>

          <a href="projects.html" class="nav-item active">Projects</a>
          <a href="people.html" class="nav-item">People</a>
          <a href="portfolios.html" class="nav-item">Portfolios</a>
        </nav>
      </aside>
    </div>

    <div class="right-content">

      <div class="page-head">
        <div>
          <h1>Projects</h1>
          <p class="subtitle">3 active projects</p>
        </div>
        <button class="primary-btn">+ New project</button>
      </div>

      <div class="projects-grid">

        <div class="project-card">
          <div class="project-title">
            <span class="dot dot-todo"></span>
            <h3>Website redesign</h3>
          </div>
          <div class="project-meta">8 of 14 tasks done</div>
          <div class="progress-bar">
            <div class="fill" style="width:57%; background-color:#d97b3f;"></div>
          </div>
          <div class="avatar-group">
            <div class="avatar avatar-teal">AK</div>
            <div class="avatar avatar-blue">RS</div>
          </div>
        </div>

        <div class="project-card">
          <div class="project-title">
            <span class="dot dot-progress"></span>
            <h3>Backend API</h3>
          </div>
          <div class="project-meta">3 of 10 tasks done</div>
          <div class="progress-bar">
            <div class="fill" style="width:30%; background-color:#1f5a8c;"></div>
          </div>
          <div class="avatar-group">
            <div class="avatar avatar-coral">PJ</div>
          </div>
        </div>

        <div class="project-card">
          <div class="project-title">
            <span class="dot dot-done"></span>
            <h3>Marketing launch</h3>
          </div>
          <div class="project-meta">9 of 9 tasks done</div>
          <div class="progress-bar">
            <div class="fill" style="width:100%; background-color:#1f6b3d;"></div>
          </div>
          <div class="avatar-group">
            <div class="avatar avatar-purple">MN</div>
          </div>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
